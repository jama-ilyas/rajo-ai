<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons & PWA icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- Viewport — disables auto-zoom on input focus on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#467ed3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RAJO AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="RAJO AI" />

    <!-- Primary -->
    <title>Rajo AI - Somali Voice Dataset</title>
    <meta name="title" content="Rajo AI - Somali Voice Dataset" />
    <meta
      name="description"
      content="Rajo AI is an open initiative dedicated to ethical, high-quality Somali voice AI. Donate your voice and help build the future of Somali speech technology."
    />
    <link rel="canonical" href="https://rajoai.com" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rajoai.com" />
    <meta property="og:title" content="Rajo AI — Somali Voice Dataset" />
    <meta property="og:description" content="Help build ethical Somali voice AI by reading short Somali prompts." />
    <meta property="og:image" content="https://rajoai.com/og-image.png" />
    <meta property="og:site_name" content="Rajo AI" />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://rajoai.com" />
    <meta property="twitter:title" content="Rajo AI — Somali Voice Dataset" />
    <meta property="twitter:description" content="Help build ethical Somali voice AI by reading short Somali prompts." />
    <meta property="twitter:image" content="https://rajoai.com/og-image.png" />

    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-wPvqoI3wfw9toz0YmikTO.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>

    <!-- Preload LCP hero image (WebP for supporting browsers, PNG fallback handled in JSX) -->
    <link rel="preload" as="image" href="/somalia-coast.webp" type="image/webp" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: preload switches to stylesheet after download -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
