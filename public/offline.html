<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#467ed3" />
  <title>RAJO AI — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #ffffff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: #467ed3;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 12px 40px rgba(70, 126, 211, 0.35);
    }
    .icon-wrap svg { width: 40px; height: 40px; }
    h1 {
      font-size: 1.75rem;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    p {
      margin-top: 12px;
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      max-width: 320px;
    }
    .somali {
      margin-top: 8px;
      font-size: 0.875rem;
      color: #94a3b8;
      font-style: italic;
    }
    .retry-btn {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #467ed3;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s;
      min-height: 48px;
    }
    .retry-btn:hover { background: #3567b8; }
    .status-dots {
      margin-top: 48px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e2e8f0;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.25s; }
    .dot:nth-child(3) { animation-delay: 0.5s; }
    @keyframes pulse-dot {
      0%, 100% { background: #e2e8f0; transform: scale(1); }
      50% { background: #467ed3; transform: scale(1.25); }
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 28a4 4 0 0 1 0-16m0 0a4 4 0 0 1 4-4 4 4 0 0 1 7.93-1A6 6 0 0 1 32 14a6 6 0 0 1-1 12H8Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="36" x2="16" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="36" x2="24" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M16 36h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>No internet connection found. Check your connection and try again.</p>
  <p class="somali">Xiriirka internetka ma jiro. Fadlan hubi xiriirkaaga.</p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M3 21v-5h5"/>
    </svg>
    Try again
  </button>

  <div class="status-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
